<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gørg's Hotdog Run</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Arial Black', Arial, sans-serif;
    }
    #game-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      display: block;
      touch-action: none;
      image-rendering: pixelated;
    }
    #jump-area {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 0 8px;
      width: 100%;
      background: rgba(0, 25, 55, 0.82);
      border-top: 2px solid rgba(80, 170, 230, 0.3);
    }
    #jump-btn {
      width: clamp(180px, 36vw, 280px);
      height: 56px;
      background: linear-gradient(to bottom, #FF8C42 0%, #e84400 100%);
      color: #fff;
      font-size: clamp(16px, 3.2vw, 21px);
      font-weight: 900;
      font-family: 'Arial Black', Arial, sans-serif;
      border: none;
      border-radius: 28px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      box-shadow: 0 5px 0 #7a2000, 0 0 24px rgba(255,100,0,0.4);
      letter-spacing: 1px;
      outline: none;
      transition: transform 0.06s, box-shadow 0.06s, background 0.06s;
    }
    #jump-btn.held {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #7a2000, 0 0 10px rgba(255,100,0,0.25);
      background: linear-gradient(to bottom, #d06020 0%, #b03000 100%);
    }
  </style>
</head>
<body>
<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="jump-area">
    <button id="jump-btn">JUMP 🌊</button>
  </div>
</div>
<script>
// ─── CANVAS SETUP ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const BASE_W = 800;
const BASE_H = 450;

const BTN_H = 78; // jump button area height in CSS pixels

function resize() {
  const scaleX = window.innerWidth  / BASE_W;
  const scaleY = (window.innerHeight - BTN_H) / BASE_H;
  const scale  = Math.min(scaleX, scaleY);
  canvas.width  = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width  = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── CONSTANTS ─────────────────────────────────────────────────────────────────
const GROUND_Y   = BASE_H - 80;
const GRAVITY    = 0.55;
const JUMP_MIN   = -10;          // base jump on press
const JUMP_MAX   = -15;          // not used for charge; kept for boost ceiling
const HOLD_MAX   = 500;          // ms of gravity-reduced boost while holding
const PLAYER_X   = 130;
const INIT_SPEED = 4.5;
const MAX_SPEED  = 12;
const ACCEL      = 0.000157;     // ~30% slower than previous (was 0.00032)

// ─── COLOURS ───────────────────────────────────────────────────────────────────
const C = {
  sky1:'#87CEEB', sky2:'#dff6ff',
  water:'#29b6f6', waterDeep:'#0288d1',
  tile:'#b3e5fc',  tileLine:'#81d4fa',
  ground:'#e0f7fa', groundLine:'#80deea',
  sun:'#FFD600',
  hotdog:'#c0392b', bun:'#f39c12', mustard:'#f1c40f',
  gorg_body:'#FF6B35', gorg_hair:'#8B4513',
  gorg_shorts:'#0077b6',gorg_skin:'#FDBCB4',
  obstacle_chair:'#F9A825', obstacle_ball:'#E91E63',
  obstacle_noodle:'#FF5722', obstacle_flamingo:'#EC407A',
  particle:'#FFD600',
};

// ─── GAME STATE ────────────────────────────────────────────────────────────────
let state       = 'start';   // 'start' | 'playing' | 'dead'
let score       = 0;
let hotdogs     = 0;
let distance    = 0;
let speed       = INIT_SPEED;
let elapsed     = 0;
let lastTime    = 0;
let holdStart   = 0;
let isHolding   = false;
let bgOffset    = 0;
let cloudOffset = 0;
let highScore   = 0;
let highHotdogs = 0;
let comboCount  = 0;
let comboTimer  = 0;
let screenShake = 0;
let lastObstacleType = null;

// ─── PLAYER ────────────────────────────────────────────────────────────────────
const player = {
  x: PLAYER_X,
  y: GROUND_Y,
  w: 36,
  h: 52,
  vy: 0,
  onGround: true,
  frame: 0,
  frameTimer: 0,
  legAngle: 0,
  squish: 1,          // y-scale for squish/stretch
  jumpDust: false,
  isDead: false,
  deathTimer: 0,
  tilt: 0,
};

// ─── OBSTACLES ─────────────────────────────────────────────────────────────────
let obstacles   = [];
let hotdogItems = [];
let particles   = [];
let clouds      = [];
let bgTrees     = [];

// Tube colour palette – vivid, none close to the pool blue/cyan water
const TUBE_COLORS = ['#FF5252', '#FF9800', '#FFD600', '#E040FB', '#76FF03'];

// Obstacle types: pool obstacles + flying ostrich
const POOL_OBSTACLE_TYPES    = ['tube','noodle','tallNoodle','twinNoodle','bigTube','ball','lounger'];
const FLYING_OBSTACLE_TYPES  = ['ostrich'];
// Pool ×4, ostrich ×1
const OBSTACLE_TYPES = [
  ...POOL_OBSTACLE_TYPES,
  ...POOL_OBSTACLE_TYPES,
  ...POOL_OBSTACLE_TYPES,
  ...POOL_OBSTACLE_TYPES,
  ...FLYING_OBSTACLE_TYPES,
];

function spawnObstacle() {
  let t;
  do {
    t = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
  } while (
    t === lastObstacleType ||
    (t === 'ostrich' && hotdogs < 20)
  );
  lastObstacleType = t;
  let w, h, gy, flying = false, color = null;
  switch(t) {
    // h = how far above the waterline the pool obstacle protrudes.
    case 'tube': {
      const tubeDepths = [GROUND_Y, GROUND_Y + 14, GROUND_Y + 28];
      gy = tubeDepths[Math.floor(Math.random() * tubeDepths.length)];
      color = TUBE_COLORS[Math.floor(Math.random() * TUBE_COLORS.length)];
      w = 62; h = 0; break;
    }
    case 'noodle':    w=26;  h=26; gy=GROUND_Y; break;
    case 'tallNoodle':w=26;  h=58; gy=GROUND_Y; break;
    case 'twinNoodle':w=64;  h=36; gy=GROUND_Y; break;
    case 'bigTube': {
      const bigTubeDepths = [GROUND_Y, GROUND_Y + 14, GROUND_Y + 28];
      gy = bigTubeDepths[Math.floor(Math.random() * bigTubeDepths.length)];
      color = TUBE_COLORS[Math.floor(Math.random() * TUBE_COLORS.length)];
      w = 80; h = 0; break;
    }
    case 'ball': {
      const ballDepths = [GROUND_Y, GROUND_Y + 12, GROUND_Y + 24];
      gy = ballDepths[Math.floor(Math.random() * ballDepths.length)];
      w = 44; h = 0; break;
    }
    case 'lounger': {
      const loungerDepths = [GROUND_Y, GROUND_Y + 12, GROUND_Y + 24, GROUND_Y + 36];
      gy = loungerDepths[Math.floor(Math.random() * loungerDepths.length)];
      color = TUBE_COLORS[Math.floor(Math.random() * TUBE_COLORS.length)];
      w = 112; h = 0; break;
    }
    case 'ostrich': {
      const skyHeights = [
        GROUND_Y - 60, GROUND_Y - 85, GROUND_Y - 112,
        GROUND_Y - 140, GROUND_Y - 168,
      ];
      gy = skyHeights[Math.floor(Math.random() * skyHeights.length)];
      w=66; h=52; flying=true; break;
    }
  }
  obstacles.push({ type:t, x:BASE_W+60, w, h, gy, hit:false, t:0, flying, color, quackTimer:0 });
}

function spawnHotdog() {
  // Heights above water (need jump) and inside pool (collected by running)
  const heights = [
    GROUND_Y - 120, GROUND_Y - 80, GROUND_Y - 40, GROUND_Y - 10,
    GROUND_Y + 14, GROUND_Y + 30,
  ];
  const yy = heights[Math.floor(Math.random() * heights.length)];
  hotdogItems.push({
    x: BASE_W + 20,
    y: yy,
    collected: false,
    bobOffset: Math.random() * Math.PI * 2,
    floatT: 0,
  });
}

function spawnCloud() {
  clouds.push({
    x: BASE_W + 60,
    y: 30 + Math.random() * 100,
    r: 25 + Math.random() * 40,
    speed: 0.5 + Math.random() * 0.8,
  });
}

function spawnBgTree() {
  bgTrees.push({ x: BASE_W + 20, y: GROUND_Y - 2, size: 24 + Math.random()*20, speed: speed * 0.4 });
}

// ─── INITIAL SCENERY ───────────────────────────────────────────────────────────
for(let i=0;i<4;i++) clouds.push({x:80+i*220,y:30+Math.random()*90,r:28+Math.random()*35,speed:0.6+Math.random()*0.5});
for(let i=0;i<5;i++) bgTrees.push({x:60+i*160,y:GROUND_Y-2,size:24+Math.random()*18,speed:INIT_SPEED*0.4});

// ─── SPAWN SCHEDULING ──────────────────────────────────────────────────────────
let obstacleTimer = 0;
let obstacleGap   = 1800;   // ms between obstacles (decreases with speed)
let hotdogTimer   = 0;
let hotdogGap     = 800;
let cloudTimer    = 0;
let treeTimer     = 0;

// ─── INPUT ─────────────────────────────────────────────────────────────────────
function onDown(e) {
  e.preventDefault();
  if (state === 'start') { startGame(); return; }
  if (state === 'dead')  { startGame(); return; }
  if (state === 'playing') {
    holdStart = performance.now();
    isHolding = true;
    doJump();   // jump starts immediately on press
  }
}

function onUp(e) {
  e.preventDefault();
  isHolding = false;   // releasing ends the gravity-boost phase
}

// Canvas: advance start/dead states only — never triggers a jump during play
canvas.addEventListener('mousedown',  e => { e.preventDefault(); if (state !== 'playing') onDown(e); }, {passive:false});
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (state !== 'playing') onDown(e); }, {passive:false});

// Keyboard: full control (desktop)
document.addEventListener('keydown', e => { if(e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); onDown(e); } });
document.addEventListener('keyup',   e => { if(e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); onUp(e);   } });

// Jump button: dedicated jump control (tap = small jump, hold = big jump)
const jumpBtn = document.getElementById('jump-btn');
function btnDown(e) { e.preventDefault(); jumpBtn.classList.add('held');    onDown(e); }
function btnUp(e)   { e.preventDefault(); jumpBtn.classList.remove('held'); onUp(e);   }
jumpBtn.addEventListener('mousedown',   btnDown, {passive:false});
jumpBtn.addEventListener('mouseup',     btnUp,   {passive:false});
jumpBtn.addEventListener('mouseleave',  btnUp,   {passive:false});
jumpBtn.addEventListener('touchstart',  btnDown, {passive:false});
jumpBtn.addEventListener('touchend',    btnUp,   {passive:false});
jumpBtn.addEventListener('touchcancel', btnUp,   {passive:false});

function doJump() {
  if (!player.onGround) return;
  player.vy       = JUMP_MIN;   // base launch velocity — always the same
  player.onGround = false;
  player.squish   = 0.75;
  spawnJumpParticles();
}

// ─── GAME CONTROL ──────────────────────────────────────────────────────────────
function startGame() {
  state       = 'playing';
  score       = 0;
  hotdogs     = 0;
  distance    = 0;
  speed       = INIT_SPEED;
  elapsed     = 0;
  obstacles   = [];
  hotdogItems = [];
  particles   = [];
  comboCount       = 0;
  comboTimer       = 0;
  isHolding        = false;
  lastObstacleType = null;

  player.y        = GROUND_Y;
  player.vy       = 0;
  player.onGround = true;
  player.isDead   = false;
  player.deathTimer = 0;
  player.tilt     = 0;
  player.squish   = 1;
  player.frame    = 0;

  obstacleTimer = 800;
  hotdogTimer   = 1500;
  cloudTimer    = 3000;
  treeTimer     = 1200;

  startMusic();
}

function killPlayer() {
  if (player.isDead) return;
  player.isDead   = true;
  player.deathTimer = 0;
  screenShake     = 12;
  state           = 'dead';
  if (hotdogs > highHotdogs) highHotdogs = hotdogs;
  if (score   > highScore)   highScore   = score;
  spawnDeathParticles();
  stopMusic();
  playReee();
}

// ─── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnJumpParticles() {
  for(let i=0;i<6;i++) {
    particles.push({
      x: player.x + player.w/2 + (Math.random()-0.5)*20,
      y: GROUND_Y + player.h,
      vx: (Math.random()-0.5)*3,
      vy: -Math.random()*3,
      life:1, decay: 0.05+Math.random()*0.04,
      r: 3+Math.random()*4,
      color:'rgba(255,255,255,0.8)'
    });
  }
}

function spawnCollectParticles(x,y) {
  for(let i=0;i<14;i++) {
    const angle = (i/14)*Math.PI*2;
    particles.push({
      x, y,
      vx: Math.cos(angle)*( 2+Math.random()*4 ),
      vy: Math.sin(angle)*( 2+Math.random()*4 ),
      life:1, decay:0.04+Math.random()*0.03,
      r: 3+Math.random()*4,
      color: i%2===0 ? '#FFD600' : '#FF6B35'
    });
  }
}

function spawnDeathParticles() {
  for(let i=0;i<20;i++) {
    particles.push({
      x: player.x+player.w/2 + (Math.random()-0.5)*player.w,
      y: player.y+player.h/2 + (Math.random()-0.5)*player.h,
      vx: (Math.random()-0.5)*8,
      vy: -Math.random()*8,
      life:1, decay:0.025+Math.random()*0.02,
      r: 4+Math.random()*6,
      color: i%3===0?'#FF6B35':i%3===1?'#FFD600':'#FFFFFF'
    });
  }
}

// ─── COLLISION HELPERS ─────────────────────────────────────────────────────────
function playerRect() {
  return {
    x: player.x + 5,
    y: player.y,
    w: player.w - 10,
    h: player.h,
  };
}

function obstacleRect(o) {
  if (o.flying) {
    // Sky obstacle – centered at gy, only threatens Gørg while airborne
    return { x: o.x + 10, y: o.gy - 26, w: o.w - 20, h: 52 };
  }
  // Pool obstacle – top at (gy - h), extends 65px into the water
  const top = o.gy - o.h;
  return { x: o.x, y: top, w: o.w, h: (o.gy + 65) - top };
}

function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x &&
         a.y < b.y+b.h && a.y+a.h > b.y;
}

// ─── UPDATE ────────────────────────────────────────────────────────────────────
function update(dt) {
  if (state !== 'playing') return;

  elapsed     += dt;
  distance    += speed * dt / 60;
  score        = Math.floor(distance / 10);

  // Accelerate over time
  speed = Math.min(MAX_SPEED, INIT_SPEED + elapsed * ACCEL);

  // Spawn scheduling
  obstacleTimer -= dt;
  hotdogTimer   -= dt;
  cloudTimer    -= dt;
  treeTimer     -= dt;
  comboTimer    -= dt;
  if (comboTimer <= 0) comboCount = 0;

  const spawnGap = Math.max(1170, 2340 - (elapsed * 0.195));
  if (obstacleTimer <= 0) {
    spawnObstacle();
    obstacleTimer = spawnGap + (Math.random()-0.5)*300;
  }
  const hdGap = Math.max(500, 800 - (elapsed * 0.04));
  if (hotdogTimer <= 0) {
    spawnHotdog();
    hotdogTimer = hdGap + (Math.random()-0.5)*400;
  }
  if (cloudTimer <= 0) { spawnCloud(); cloudTimer = 3000+Math.random()*2000; }
  if (treeTimer  <= 0) { spawnBgTree(); treeTimer = 1000+Math.random()*800; }

  // Player physics
  if (!player.onGround) {
    // While the button is held AND still ascending AND within boost window,
    // gravity is heavily reduced — this lets a longer hold produce a higher arc.
    const heldSoFar = isHolding ? (performance.now() - holdStart) : HOLD_MAX + 1;
    const boosting  = isHolding && player.vy < 0 && heldSoFar < HOLD_MAX;
    player.vy     += boosting ? GRAVITY * 0.28 : GRAVITY;
    player.y      += player.vy;
    player.squish += (1 - player.squish) * 0.2;
    if (player.y >= GROUND_Y) {
      player.y        = GROUND_Y;
      player.vy       = 0;
      player.onGround = true;
      player.squish   = 1.3;
      spawnJumpParticles();
    }
  } else {
    player.squish += (1 - player.squish) * 0.15;
  }

  // Leg animation
  player.frameTimer += dt;
  if (player.frameTimer > 80) {
    player.frame     = (player.frame + 1) % 4;
    player.frameTimer = 0;
  }
  player.legAngle = Math.sin(player.frame / 4 * Math.PI * 2) * 30;

  // Screen shake decay
  if (screenShake > 0) screenShake *= 0.8;

  // Obstacles
  for(let i=obstacles.length-1; i>=0; i--) {
    const o = obstacles[i];
    o.x -= speed;
    o.t  += dt;
    if (o.x + o.w < -20) { obstacles.splice(i,1); continue; }
    if (o.type === 'ostrich') {
      o.quackTimer += dt;
      if (o.quackTimer >= 1200) { o.quackTimer -= 1200; playQuack(); }
    }
    if (!o.hit && rectsOverlap(playerRect(), obstacleRect(o))) {
      killPlayer();
    }
  }

  // Hotdogs
  for(let i=hotdogItems.length-1; i>=0; i--) {
    const h = hotdogItems[i];
    h.x    -= speed;
    h.floatT += dt;
    if (h.x + 30 < -20) { hotdogItems.splice(i,1); continue; }
    if (!h.collected) {
      const hr = { x:h.x-17, y:h.y-12, w:34, h:24 }; // 20% larger hitbox
      if (rectsOverlap(playerRect(), hr)) {
        h.collected = true;
        hotdogs++;
        score += 50;
        comboCount++;
        comboTimer = 2000;
        spawnCollectParticles(h.x, h.y);
        playChomp();
        hotdogItems.splice(i,1);
      }
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i,1);
  }

  // Clouds
  for(let i=clouds.length-1;i>=0;i--) {
    clouds[i].x -= clouds[i].speed;
    if (clouds[i].x < -100) clouds.splice(i,1);
  }

  // BG trees
  for(let i=bgTrees.length-1;i>=0;i--) {
    bgTrees[i].x -= speed * 0.35;
    if (bgTrees[i].x < -60) bgTrees.splice(i,1);
  }

  bgOffset    = (bgOffset + speed * 0.15) % BASE_W;
  cloudOffset = (cloudOffset + 0.4) % BASE_W;
}

// ─── DRAW HELPERS ──────────────────────────────────────────────────────────────
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ─── DRAW BACKGROUND ───────────────────────────────────────────────────────────
function drawBackground() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0,0,0,GROUND_Y);
  skyGrad.addColorStop(0,'#5ba3d0');
  skyGrad.addColorStop(1,'#a8ddf0');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,BASE_W,GROUND_Y);

  // Sun
  ctx.save();
  ctx.shadowBlur   = 30;
  ctx.shadowColor  = '#FFD600';
  ctx.fillStyle    = '#FFE44D';
  ctx.beginPath();
  ctx.arc(BASE_W-80, 60, 36, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Sun rays
  ctx.save();
  ctx.strokeStyle = 'rgba(255,220,0,0.35)';
  ctx.lineWidth   = 3;
  for(let i=0;i<8;i++) {
    const a = (i/8)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(BASE_W-80 + Math.cos(a)*40, 60+Math.sin(a)*40);
    ctx.lineTo(BASE_W-80 + Math.cos(a)*54, 60+Math.sin(a)*54);
    ctx.stroke();
  }
  ctx.restore();

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for(const cl of clouds) {
    drawCloud(cl.x, cl.y, cl.r);
  }

  // Background palm trees
  for(const t of bgTrees) {
    drawPalmTree(t.x, t.y, t.size, 0.55);
  }

  // Pool water area
  const waterGrad = ctx.createLinearGradient(0,GROUND_Y,0,BASE_H);
  waterGrad.addColorStop(0,'#29b6f6');
  waterGrad.addColorStop(1,'#0277bd');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, GROUND_Y, BASE_W, BASE_H - GROUND_Y);

  // Pool tiles pattern
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  const tileSize = 24;
  const offX = bgOffset % tileSize;
  for(let x = -offX; x < BASE_W; x += tileSize) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.lineTo(x, BASE_H);
    ctx.stroke();
  }
  for(let y = GROUND_Y; y < BASE_H; y += tileSize) {
    ctx.beginPath();
    ctx.moveTo(0,y); ctx.lineTo(BASE_W,y);
    ctx.stroke();
  }
  ctx.restore();

  // Pool deck (ground strip)
  ctx.fillStyle = '#e8f5e9';
  ctx.fillRect(0, GROUND_Y-4, BASE_W, 8);

  // Deck pattern – dotted lane markings
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth   = 3;
  ctx.setLineDash([20,18]);
  ctx.lineDashOffset = -bgOffset;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(BASE_W, GROUND_Y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Water shimmer
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#ffffff';
  const shimmerX = (bgOffset * 2) % BASE_W;
  for(let i=0;i<6;i++) {
    const sx = (shimmerX + i * 140) % BASE_W;
    ctx.beginPath();
    ctx.ellipse(sx, GROUND_Y+30+i*12, 40+i*5, 4, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawCloud(x,y,r) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.beginPath(); ctx.arc(x,      y,    r,      0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r*0.8, y-r*0.3, r*0.75, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x-r*0.7, y-r*0.1, r*0.65, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r*1.5, y+r*0.1, r*0.55, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPalmTree(x,y,size,alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // trunk
  ctx.strokeStyle = '#795548';
  ctx.lineWidth = size/6;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x-size*0.2, y-size*0.7, x+size*0.1, y-size*1.2, x, y-size*1.6);
  ctx.stroke();
  // leaves
  ctx.fillStyle = '#388e3c';
  const leafAngles = [-70,-40,-10,20,50,80];
  for(const a of leafAngles) {
    ctx.save();
    ctx.translate(x, y-size*1.6);
    ctx.rotate(a * Math.PI/180);
    ctx.beginPath();
    ctx.ellipse(size*0.55, 0, size*0.6, size*0.12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

// ─── DRAW OBSTACLES ────────────────────────────────────────────────────────────
function drawObstacle(o) {
  ctx.save();
  switch(o.type) {
    case 'tube':
      drawInnerTube(o.x, o.gy, o.w, o.h, o.t, 28, o.color || '#FF5252');
      break;
    case 'bigTube':
      drawInnerTube(o.x, o.gy, o.w, o.h, o.t, 37, o.color || '#FF5252');
      break;
    case 'noodle':
      drawWigglyNoodle(o.x, o.gy, o.w, o.h, '#FF9800', o.t);
      break;
    case 'tallNoodle':
      drawWigglyNoodle(o.x, o.gy, o.w, o.h, '#8BC34A', o.t);
      break;
    case 'twinNoodle': {
      const nw = 24;
      drawWigglyNoodle(o.x,        o.gy, nw, o.h,        '#FF4081', o.t);
      drawWigglyNoodle(o.x+nw+16,  o.gy, nw, o.h * 0.8,  '#29B6F6', o.t + 600);
      break;
    }
    case 'ball':
      drawBeachBall(o.x, o.gy, o.w, o.h, o.t);
      break;
    case 'lounger':
      drawPoolLounger(o.x, o.gy, o.w, o.t, o.color || '#FF5252');
      break;
    case 'ostrich':
      drawOstrich(o.x, o.gy, o.w, o.t);
      break;
  }
  ctx.restore();
}

// Inflatable inner tube – sits in the pool water (center below waterline)
function drawInnerTube(x, gy, w, h, t, outerR, color) {
  const cx     = x + w / 2;
  const cy     = gy + outerR * 0.55;   // center submerged; top of ring at ~gy
  const innerR = outerR * 0.46;
  const tilt   = Math.sin(t * 0.0018) * 0.18;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(tilt);

  // Solid donut shape using evenodd fill rule
  ctx.beginPath();
  ctx.arc(0, 0, outerR, 0, Math.PI * 2, false);
  ctx.arc(0, 0, innerR, 0, Math.PI * 2, true);
  ctx.fillStyle = color;
  ctx.fill('evenodd');

  // Outer and inner ring outlines
  ctx.strokeStyle = 'rgba(0,0,0,0.22)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, outerR, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, innerR, 0, Math.PI*2); ctx.stroke();

  // Shine highlight on upper-left
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.arc(-outerR * 0.28, -outerR * 0.35, outerR * 0.2, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// Pool noodle – full-length wiggle from pool floor to tip, no muted underwater section
function drawWigglyNoodle(x, gy, w, h, color, t) {
  const cx     = x + w / 2;
  const topY   = gy - h;
  const baseY  = BASE_H - 8;
  const totalH = baseY - topY;

  // Three independent sine waves give the noodle a fluid, continuous wiggle
  const wigA = Math.sin(t * 0.003)        * 12;
  const wigB = Math.sin(t * 0.003 + 1.1)  * 7;
  const wigC = Math.sin(t * 0.003 + 2.2)  * 4;

  // Control points distributed evenly along the full height
  const cp1x = cx + wigC;            const cp1y = baseY  - totalH * 0.25;
  const cp2x = cx + wigB;            const cp2y = baseY  - totalH * 0.55;
  const cp3x = cx + wigA * 0.7;     const cp3y = baseY  - totalH * 0.78;
  const tipX  = cx + wigA;           const tipY  = topY;

  ctx.save();

  // ── Main noodle body – single gradient stroke all the way through ──
  ctx.lineWidth   = w;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.strokeStyle = color;
  ctx.beginPath();
  ctx.moveTo(cx, baseY);
  // Two chained cubic beziers for a nice S-curve wiggle
  ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, cx + wigB * 0.5, baseY - totalH * 0.5);
  ctx.bezierCurveTo(cp3x, cp3y, tipX, tipY - 10, tipX, tipY);
  ctx.stroke();

  // ── Highlight stripe along full length ──
  ctx.strokeStyle = 'rgba(255,255,255,0.36)';
  ctx.lineWidth   = w * 0.27;
  ctx.beginPath();
  ctx.moveTo(cx - w * 0.17, baseY);
  ctx.bezierCurveTo(
    cp1x - w*0.17, cp1y,
    cp2x - w*0.17, cp2y,
    cx + wigB*0.5 - w*0.17, baseY - totalH*0.5
  );
  ctx.bezierCurveTo(
    cp3x - w*0.17, cp3y,
    tipX - w*0.17, tipY-10,
    tipX - w*0.17, tipY
  );
  ctx.stroke();

  // ── Rounded top cap ──
  ctx.fillStyle = shadeColor(color, 22);
  ctx.beginPath();
  ctx.arc(tipX, tipY, w / 2, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// Beach ball – sits in the pool water, top peeking just at the waterline
function drawBeachBall(x, bot, w, h, t) {
  const r   = w / 2;
  const cx  = x + r;
  const bob = Math.sin(t * 0.002) * 3;
  const cy  = bot + r * 0.45 + bob;  // center below waterline, top ring visible

  ctx.save();

  // Ball segments (6 coloured wedges)
  const ballColors = ['#E91E63','#FFEB3B','#2196F3','#E91E63','#FFEB3B','#2196F3'];
  for(let i = 0; i < 6; i++) {
    const a1 = (i / 6) * Math.PI * 2;
    const a2 = ((i + 1) / 6) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, a1, a2);
    ctx.closePath();
    ctx.fillStyle = ballColors[i];
    ctx.fill();
  }

  // White seam lines between segments
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth   = 1;
  for(let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    ctx.stroke();
  }

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.beginPath();
  ctx.arc(cx - r * 0.28, cy - r * 0.3, r * 0.25, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// Inflatable pool lounger – wide floatie resting on the water surface
function drawPoolLounger(x, gy, w, t, color) {
  const bob      = Math.sin(t * 0.0014) * 2.5;
  const y        = gy + bob;
  const cLight   = shadeColor(color, 50);
  const cDark    = shadeColor(color, -55);
  const cMid     = shadeColor(color, 20);

  ctx.save();

  // ── Main body ──
  const bodyGrad = ctx.createLinearGradient(x, y - 18, x, y + 10);
  bodyGrad.addColorStop(0,   cLight);
  bodyGrad.addColorStop(0.5, color);
  bodyGrad.addColorStop(1,   cDark);
  ctx.fillStyle = bodyGrad;
  roundRect(x + 6, y - 16, w - 12, 22, 9);
  ctx.fill();

  // White diagonal stripes
  ctx.save();
  ctx.beginPath();
  roundRect(x + 6, y - 16, w - 12, 22, 9);
  ctx.clip();
  ctx.strokeStyle = 'rgba(255,255,255,0.32)';
  ctx.lineWidth   = 7;
  for(let i = 0; i < 8; i++) {
    const sx = x + i * 18 - 10;
    ctx.beginPath();
    ctx.moveTo(sx,        y - 16);
    ctx.lineTo(sx + 22,   y + 6);
    ctx.stroke();
  }
  ctx.restore();

  // Outer rim stroke
  ctx.strokeStyle = cDark;
  ctx.lineWidth   = 2.5;
  roundRect(x + 6, y - 16, w - 12, 22, 9);
  ctx.stroke();

  // ── Headrest bump (right end) ──
  const hGrad = ctx.createRadialGradient(x+w-18, y-22, 2, x+w-18, y-20, 16);
  hGrad.addColorStop(0, cLight);
  hGrad.addColorStop(1, color);
  ctx.fillStyle = hGrad;
  ctx.beginPath();
  ctx.ellipse(x + w - 18, y - 21, 16, 11, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = cDark;
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.ellipse(x + w - 18, y - 21, 16, 11, 0, 0, Math.PI*2);
  ctx.stroke();

  // ── Armrest bumps ──
  [x + w*0.28, x + w*0.68].forEach(ax => {
    ctx.fillStyle = cMid;
    ctx.beginPath();
    ctx.ellipse(ax, y - 19, 12, 7, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = cDark;
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.ellipse(ax, y - 19, 12, 7, 0, 0, Math.PI*2);
    ctx.stroke();
  });

  // ── Cup holder detail ──
  ctx.fillStyle = cDark;
  ctx.beginPath();
  ctx.arc(x + 28, y - 7, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = cLight;
  ctx.beginPath();
  ctx.arc(x + 28, y - 7, 3, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// Ostrich – tiny-winged sky menace, threatens Gørg while airborne
function drawOstrich(x, gy, w, t) {
  const cx       = x + w / 2;
  const cy       = gy;
  const wingFlap = Math.sin(t * 0.013) * 32;   // frantic small-wing flap
  const legSwing = Math.sin(t * 0.009) * 22;

  ctx.save();

  // ── Poofy tail feathers ──
  for(let i = 0; i < 6; i++) {
    const fa    = (-50 + i * 20) * Math.PI / 180;
    const even  = i % 2 === 0;
    ctx.strokeStyle = even ? '#5D4037' : '#ECEFF1';
    ctx.lineWidth   = even ? 5 : 3;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - w*0.27, cy + 4);
    ctx.lineTo(
      cx - w*0.27 + Math.cos(fa + Math.PI) * 20,
      cy + 4     + Math.sin(fa + Math.PI) * 20
    );
    ctx.stroke();
  }

  // ── Body ──
  const bodyGrad = ctx.createRadialGradient(cx+4, cy-6, 3, cx, cy, w*0.3);
  bodyGrad.addColorStop(0, '#6D4C41');
  bodyGrad.addColorStop(1, '#1a0800');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(cx, cy, w*0.3, w*0.27, 0, 0, Math.PI*2);
  ctx.fill();

  // White belly
  ctx.fillStyle = 'rgba(240,235,220,0.38)';
  ctx.beginPath();
  ctx.ellipse(cx + 5, cy + 7, w*0.14, w*0.13, 0, 0, Math.PI*2);
  ctx.fill();

  // ── Tiny left wing ──
  ctx.save();
  ctx.translate(cx - w*0.16, cy - 3);
  ctx.rotate((-22 + wingFlap) * Math.PI / 180);
  ctx.fillStyle = '#4E342E';
  ctx.beginPath();
  ctx.ellipse(0, -13, 7, 15, 0.15, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // ── Tiny right wing ──
  ctx.save();
  ctx.translate(cx + w*0.1, cy - 3);
  ctx.rotate((22 - wingFlap) * Math.PI / 180);
  ctx.fillStyle = '#4E342E';
  ctx.beginPath();
  ctx.ellipse(0, -13, 7, 15, -0.15, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // ── Long neck ──
  ctx.strokeStyle = '#FF8A65';
  ctx.lineWidth   = 9;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(cx + w*0.12, cy - w*0.18);
  ctx.bezierCurveTo(
    cx + w*0.2,  cy - w*0.38,
    cx + w*0.24, cy - w*0.52,
    cx + w*0.19, cy - w*0.63
  );
  ctx.stroke();

  // ── Head ──
  ctx.fillStyle = '#FF8A65';
  ctx.beginPath();
  ctx.arc(cx + w*0.18, cy - w*0.69, 10, 0, Math.PI*2);
  ctx.fill();

  // Big cartoon eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx + w*0.21, cy - w*0.71, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(cx + w*0.22, cy - w*0.71, 2.8, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx + w*0.225, cy - w*0.715, 1, 0, Math.PI*2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#FFB300';
  ctx.beginPath();
  ctx.moveTo(cx + w*0.26, cy - w*0.67);
  ctx.lineTo(cx + w*0.38, cy - w*0.65);
  ctx.lineTo(cx + w*0.26, cy - w*0.63);
  ctx.closePath();
  ctx.fill();

  // ── Dangling running legs ──
  ctx.strokeStyle = '#FF8A65';
  ctx.lineWidth   = 4;
  ctx.lineCap     = 'round';

  // left leg
  ctx.save();
  ctx.translate(cx - 9, cy + w*0.22);
  ctx.rotate(legSwing * Math.PI / 180);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-3, 22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-3,22); ctx.lineTo(-9,27); ctx.stroke();
  ctx.restore();

  // right leg
  ctx.save();
  ctx.translate(cx + 9, cy + w*0.22);
  ctx.rotate(-legSwing * Math.PI / 180);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(3, 22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3,22); ctx.lineTo(9,27); ctx.stroke();
  ctx.restore();

  ctx.restore();
}

function shadeColor(hex, pct) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0,Math.min(255,r+pct)); g = Math.max(0,Math.min(255,g+pct)); b = Math.max(0,Math.min(255,b+pct));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ─── DRAW HOTDOG ───────────────────────────────────────────────────────────────
function drawHotdog(h) {
  const x = h.x;
  const bob = Math.sin(h.floatT * 0.003 + h.bobOffset) * 5;
  const y   = h.y + bob;
  ctx.save();

  // glow
  ctx.shadowBlur  = 18;
  ctx.shadowColor = '#FFD600';

  // bun top (20% larger: rx 16→19, ry 8→10)
  ctx.fillStyle = '#f0a500';
  ctx.beginPath();
  ctx.ellipse(x, y-7, 19, 10, 0, Math.PI, 0);
  ctx.fill();
  // bun bottom
  ctx.fillStyle = '#c8820a';
  ctx.beginPath();
  ctx.ellipse(x, y+5, 19, 7, 0, 0, Math.PI);
  ctx.fill();
  // sausage
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.ellipse(x, y-1, 17, 6, 0, 0, Math.PI*2);
  ctx.fill();
  // mustard squiggle (scaled 1.2×)
  ctx.strokeStyle = '#f1c40f';
  ctx.lineWidth   = 2.5;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(x-11, y-3);
  ctx.bezierCurveTo(x-6,y-8, x,y+1, x+6,y-7);
  ctx.bezierCurveTo(x+8,y-10, x+12,y-5, x+12,y-2);
  ctx.stroke();

  ctx.restore();
}

// ─── DRAW GØRG ─────────────────────────────────────────────────────────────────
function drawGorg() {
  ctx.save();

  const cx   = player.x + player.w / 2;
  const baseY= player.y;
  const sy   = player.squish;
  const onG  = player.onGround;

  // squish/stretch transform
  ctx.translate(cx, baseY + player.h);
  ctx.scale(1, sy);
  ctx.translate(-cx, -(baseY + player.h));

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(cx, GROUND_Y + player.h + 3, (player.w/2)*0.9, 5, 0, 0, Math.PI*2);
  ctx.fill();

  const legLen = 16;
  const legOff = player.legAngle * (Math.PI/180);

  // ── LEGS ──
  ctx.lineCap    = 'round';
  ctx.lineWidth  = 8;
  ctx.strokeStyle = onG ? '#0077b6' : '#FDBCB4';

  // left leg
  const la = onG ? legOff : (player.vy < 0 ? -0.5 : 0.5);
  ctx.beginPath();
  ctx.moveTo(cx-5, baseY+player.h-14);
  ctx.lineTo(cx-5 + Math.sin(la)*legLen, baseY+player.h - 14 + Math.abs(Math.cos(la))*legLen);
  ctx.stroke();
  // right leg
  const ra = onG ? -legOff : (player.vy < 0 ? 0.5 : -0.5);
  ctx.beginPath();
  ctx.moveTo(cx+5, baseY+player.h-14);
  ctx.lineTo(cx+5 + Math.sin(ra)*legLen, baseY+player.h - 14 + Math.abs(Math.cos(ra))*legLen);
  ctx.stroke();

  // ── SHORTS ──
  ctx.fillStyle = '#0077b6';
  roundRect(cx-14, baseY+player.h-22, 28, 14, 5);
  ctx.fill();
  if (!onG) {
    // Tropical stripe pattern when airborne
    ctx.save();
    ctx.beginPath(); roundRect(cx-14, baseY+player.h-22, 28, 14, 5); ctx.clip();
    ctx.strokeStyle = '#FF6B35'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx-14, baseY+player.h-17); ctx.lineTo(cx+14, baseY+player.h-17); ctx.stroke();
    ctx.strokeStyle = '#FFD600';
    ctx.beginPath(); ctx.moveTo(cx-14, baseY+player.h-12); ctx.lineTo(cx+14, baseY+player.h-12); ctx.stroke();
    ctx.restore();
  }

  // ── BODY / SHIRT ──
  const bodyGrad = ctx.createLinearGradient(cx-16, baseY+10, cx+16, baseY+10);
  bodyGrad.addColorStop(0,'#FF8C42');
  bodyGrad.addColorStop(1,'#FF6B35');
  ctx.fillStyle = bodyGrad;
  roundRect(cx-14, baseY + 12, 28, player.h - 30, 8);
  ctx.fill();

  // shirt print: tiny hotdog icon
  ctx.font      = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🌭', cx, baseY + 30);

  // ── ARMS ──
  ctx.lineWidth   = 7;
  ctx.strokeStyle = '#FDBCB4';
  ctx.lineCap     = 'round';
  const armSwing = onG ? Math.sin(player.frame/4*Math.PI*2 + Math.PI) * 20 : (player.vy < 0 ? -40 : 20);
  // left arm
  ctx.beginPath();
  ctx.moveTo(cx-14, baseY+18);
  ctx.lineTo(cx-14-Math.cos(armSwing*Math.PI/180)*14, baseY+18+Math.sin(armSwing*Math.PI/180)*14);
  ctx.stroke();
  // right arm
  ctx.beginPath();
  ctx.moveTo(cx+14, baseY+18);
  ctx.lineTo(cx+14+Math.cos(armSwing*Math.PI/180)*14, baseY+18+Math.sin(armSwing*Math.PI/180)*14);
  ctx.stroke();

  // ── HEAD ──
  ctx.fillStyle = '#FDBCB4';
  ctx.beginPath();
  ctx.arc(cx, baseY+8, 18, 0, Math.PI*2);
  ctx.fill();

  // ── HAIR ──
  ctx.fillStyle = '#5D2E0C';
  ctx.beginPath();
  ctx.arc(cx, baseY+1, 18, Math.PI, 0);
  ctx.fill();
  // hair tufts
  ctx.fillStyle = '#5D2E0C';
  for(let i=0;i<4;i++) {
    const hx = cx - 12 + i*8;
    ctx.beginPath();
    ctx.arc(hx, baseY - 12, 6, 0, Math.PI*2);
    ctx.fill();
  }

  // ── EYES ──
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx-6, baseY+7, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+6, baseY+7, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  // eye direction: look forward, slightly determined
  ctx.beginPath(); ctx.arc(cx-5, baseY+7, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+7, baseY+7, 2.5, 0, Math.PI*2); ctx.fill();
  // pupils
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx-4.5, baseY+6.5, 0.9, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+7.5, baseY+6.5, 0.9, 0, Math.PI*2); ctx.fill();

  // ── SUNGLASSES ──
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth   = 2;
  ctx.fillStyle   = 'rgba(0,100,200,0.55)';
  roundRect(cx-12, baseY+4, 10, 7, 3); ctx.fill(); ctx.stroke();
  roundRect(cx+2,  baseY+4, 10, 7, 3); ctx.fill(); ctx.stroke();
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx-2, baseY+7); ctx.lineTo(cx+2, baseY+7); ctx.stroke();
  // temples
  ctx.beginPath(); ctx.moveTo(cx-12, baseY+7); ctx.lineTo(cx-18, baseY+6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+12, baseY+7); ctx.lineTo(cx+18, baseY+6); ctx.stroke();

  // ── MOUTH ──
  ctx.strokeStyle = '#c0786a';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.arc(cx, baseY+14, 5, 0.1*Math.PI, 0.9*Math.PI);
  ctx.stroke();

  ctx.restore();
}

// ─── DRAW HUD ──────────────────────────────────────────────────────────────────
function drawHUD() {
  // Speed bar
  const spFrac = (speed - INIT_SPEED) / (MAX_SPEED - INIT_SPEED);
  const barW   = 120, barH = 12, barX = BASE_W - barW - 16, barY = 16;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  roundRect(barX-2, barY-2, barW+4, barH+4, 5); ctx.fill();
  const speedGrad = ctx.createLinearGradient(barX,0,barX+barW,0);
  speedGrad.addColorStop(0,'#00e676');
  speedGrad.addColorStop(0.6,'#FFEB3B');
  speedGrad.addColorStop(1,'#ff1744');
  ctx.fillStyle = speedGrad;
  roundRect(barX, barY, barW * spFrac, barH, 4); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = 'bold 9px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('SPEED', barX, barY - 3);

  // Score pill
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(12, 12, 130, 36, 10); ctx.fill();
  ctx.fillStyle = '#FFD600';
  ctx.font      = 'bold 14px Arial Black, Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 22, 35);

  // Hotdog counter
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(12, 56, 110, 32, 10); ctx.fill();
  ctx.font      = 'bold 13px Arial';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`🌭 × ${hotdogs}`, 22, 77);

  // Combo
  if (comboCount >= 2 && comboTimer > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, comboTimer / 500);
    ctx.font        = 'bold 28px Arial Black, Arial';
    ctx.textAlign   = 'center';
    ctx.fillStyle   = '#FFD600';
    ctx.shadowBlur  = 16;
    ctx.shadowColor = '#FF6B35';
    ctx.fillText(`×${comboCount} COMBO!`, BASE_W/2, 80);
    ctx.restore();
  }

  // Boost bar — shows while holding and still in the boost window
  if (isHolding && !player.onGround && state === 'playing') {
    const heldFrac = Math.min(1, (performance.now() - holdStart) / HOLD_MAX);
    const boostLeft = 1 - heldFrac;  // bar drains as boost is used
    const indW = 54, indH = 8;
    const ix = player.x + player.w/2 - indW/2;
    const iy = player.y - 32;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(ix, iy, indW, indH, 4); ctx.fill();
    const iGrad = ctx.createLinearGradient(ix,0,ix+indW,0);
    iGrad.addColorStop(0,'#00e5ff');
    iGrad.addColorStop(1,'#7c4dff');
    ctx.fillStyle = iGrad;
    roundRect(ix, iy, indW * boostLeft, indH, 4); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = 'bold 8px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('BOOST', ix + indW/2, iy - 2);
  }
}

// ─── DRAW PARTICLES ────────────────────────────────────────────────────────────
function drawParticles() {
  for(const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  ctx.save();

  // Screen shake
  if (screenShake > 0.5) {
    ctx.translate(
      (Math.random()-0.5)*screenShake,
      (Math.random()-0.5)*screenShake
    );
  }

  drawBackground();

  // Draw hotdogs
  for(const h of hotdogItems) drawHotdog(h);

  // Draw obstacles (emerge from pool water)
  for(const o of obstacles) drawObstacle(o);

  // Draw Gørg
  if (!player.isDead) drawGorg();


  // Particles
  drawParticles();

  // HUD (on top, no shake)
  ctx.restore();
  if (state === 'playing') drawHUD();

  // Overlays
  if (state === 'start') { drawBackground(); drawGorg(); drawStartScreen(); }
  if (state === 'dead')  drawDeathScreen();
}

// ─── AUDIO ─────────────────────────────────────────────────────────────────────
let audioCtx       = null;
let musicActive    = false;
let musicGeneration = 0; // incremented on every start/stop to cancel stale timeouts

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// iOS requires a silent sound played inside the first user gesture to unlock audio
function unlockAudio() {
  const ac  = getAudioCtx();
  const buf = ac.createBuffer(1, 1, ac.sampleRate);
  const src = ac.createBufferSource();
  src.buffer = buf;
  src.connect(ac.destination);
  src.start(0);
  ac.resume();
}
document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });
document.addEventListener('mousedown',  unlockAudio, { once: true });

// Tropical 8-bit loop — 8 bars, C major
const MELODY_SEQ = [
  [659,250],[784,250],[659,250],[587,250],  // bar 1
  [523,250],[659,250],[523,500],            // bar 2
  [784,250],[659,250],[587,250],[523,250],  // bar 3
  [440,1000],                              // bar 4
  [784,250],[880,250],[784,250],[659,250],  // bar 5
  [587,250],[659,250],[784,500],           // bar 6
  [523,250],[587,250],[659,250],[784,250], // bar 7
  [659,1000],                             // bar 8
];

const BASS_SEQ = [
  [262,500],[392,500],[262,500],[392,500],
  [262,500],[392,500],[262,500],[392,500],
  [262,500],[392,500],[262,500],[392,500],
  [262,500],[392,500],[262,500],[392,500],
];

function schedNote(freq, t0, durSec, type, vol) {
  const ac   = audioCtx;
  const osc  = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(vol, t0);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + durSec * 0.85);
  osc.start(t0);
  osc.stop(t0 + durSec);
}

function scheduleMusicLoop(gen) {
  if (!musicActive || gen !== musicGeneration) return;
  const ac = getAudioCtx();
  let   t  = ac.currentTime + 0.05;

  for (const [freq, ms] of MELODY_SEQ) {
    schedNote(freq, t, ms / 1000 * 0.9, 'square', 0.09);
    t += ms / 1000;
  }
  let bt = ac.currentTime + 0.05;
  for (const [freq, ms] of BASS_SEQ) {
    schedNote(freq, bt, ms / 1000 * 0.7, 'square', 0.06);
    bt += ms / 1000;
  }

  const loopMs = MELODY_SEQ.reduce((s,[,ms]) => s + ms, 0);
  setTimeout(() => scheduleMusicLoop(gen), loopMs - 80);
}

function startMusic() {
  if (musicActive) return;
  musicActive = true;
  musicGeneration++;
  scheduleMusicLoop(musicGeneration);
}

function stopMusic() {
  musicActive = false;
  musicGeneration++;
  // Close the audio context to instantly cancel all pre-scheduled notes
  if (audioCtx) {
    audioCtx.close();
    audioCtx = null;
  }
}

function playQuack() {
  const ac  = getAudioCtx();
  const now = ac.currentTime;
  // Classic duck quack: short nasal honk with a downward pitch bend
  [[420, 0.28],[840, 0.10]].forEach(([freq, vol], i) => {
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq * 1.15, now);
    osc.frequency.linearRampToValueAtTime(freq * 0.75, now + 0.14);
    gain.gain.setValueAtTime(vol, now);
    gain.gain.linearRampToValueAtTime(vol * 0.6, now + 0.09);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
    osc.start(now); osc.stop(now + 0.2);
  });
}

function playChomp() {
  const ac  = getAudioCtx();
  const now = ac.currentTime;

  // "Ch" — short filtered noise burst
  const bufLen = Math.floor(ac.sampleRate * 0.07);
  const buf    = ac.createBuffer(1, bufLen, ac.sampleRate);
  const data   = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
  const noise  = ac.createBufferSource();
  noise.buffer = buf;
  const bpf    = ac.createBiquadFilter();
  bpf.type     = 'bandpass';
  bpf.frequency.value = 1400;
  bpf.Q.value  = 0.6;
  const nGain  = ac.createGain();
  nGain.gain.setValueAtTime(0.35, now);
  nGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.07);
  noise.connect(bpf); bpf.connect(nGain); nGain.connect(ac.destination);
  noise.start(now); noise.stop(now + 0.07);

  // "Omp" — descending sine thump
  const osc   = ac.createOscillator();
  const oGain = ac.createGain();
  osc.connect(oGain); oGain.connect(ac.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(320, now + 0.02);
  osc.frequency.exponentialRampToValueAtTime(80, now + 0.18);
  oGain.gain.setValueAtTime(0.45, now + 0.02);
  oGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
  osc.start(now + 0.02); osc.stop(now + 0.22);
}

function playReee() {
  const ac  = getAudioCtx();
  const now = ac.currentTime;
  const osc  = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(600,  now);
  osc.frequency.linearRampToValueAtTime(1500, now + 0.1);
  osc.frequency.linearRampToValueAtTime(900,  now + 0.35);
  osc.frequency.linearRampToValueAtTime(500,  now + 0.55);
  gain.gain.setValueAtTime(0.28, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.58);
  osc.start(now);
  osc.stop(now + 0.6);
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance('RRREEEEEEEEEEEEEEEE');
    u.pitch  = 2;
    u.rate   = 2;
    u.volume = 0.9;
    speechSynthesis.speak(u);
  }
}

// ─── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = lastTime ? Math.min(ts - lastTime, 50) : 16;
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
