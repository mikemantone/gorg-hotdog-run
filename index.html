<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gørg's Hotdog Run</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Arial Black', Arial, sans-serif;
    }
    canvas {
      display: block;
      touch-action: none;
      cursor: pointer;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── CANVAS SETUP ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const BASE_W = 800;
const BASE_H = 450;

function resize() {
  const scaleX = window.innerWidth  / BASE_W;
  const scaleY = window.innerHeight / BASE_H;
  const scale  = Math.min(scaleX, scaleY);
  canvas.width  = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width  = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── CONSTANTS ─────────────────────────────────────────────────────────────────
const GROUND_Y   = BASE_H - 80;
const GRAVITY    = 0.55;
const JUMP_MIN   = -9;
const JUMP_MAX   = -15;
const HOLD_MAX   = 400;          // ms to reach max jump
const PLAYER_X   = 130;
const INIT_SPEED = 4.5;
const MAX_SPEED  = 12;
const ACCEL      = 0.0008;       // speed units per ms

// ─── COLOURS ───────────────────────────────────────────────────────────────────
const C = {
  sky1:'#87CEEB', sky2:'#dff6ff',
  water:'#29b6f6', waterDeep:'#0288d1',
  tile:'#b3e5fc',  tileLine:'#81d4fa',
  ground:'#e0f7fa', groundLine:'#80deea',
  sun:'#FFD600',
  hotdog:'#c0392b', bun:'#f39c12', mustard:'#f1c40f',
  gorg_body:'#FF6B35', gorg_hair:'#8B4513',
  gorg_shorts:'#0077b6',gorg_skin:'#FDBCB4',
  obstacle_chair:'#F9A825', obstacle_ball:'#E91E63',
  obstacle_noodle:'#FF5722', obstacle_flamingo:'#EC407A',
  particle:'#FFD600',
};

// ─── GAME STATE ────────────────────────────────────────────────────────────────
let state       = 'start';   // 'start' | 'playing' | 'dead'
let score       = 0;
let hotdogs     = 0;
let distance    = 0;
let speed       = INIT_SPEED;
let elapsed     = 0;
let lastTime    = 0;
let holdStart   = 0;
let isHolding   = false;
let bgOffset    = 0;
let cloudOffset = 0;
let highScore   = 0;
let highHotdogs = 0;
let comboCount  = 0;
let comboTimer  = 0;
let screenShake = 0;

// ─── PLAYER ────────────────────────────────────────────────────────────────────
const player = {
  x: PLAYER_X,
  y: GROUND_Y,
  w: 36,
  h: 52,
  vy: 0,
  onGround: true,
  frame: 0,
  frameTimer: 0,
  legAngle: 0,
  squish: 1,          // y-scale for squish/stretch
  jumpDust: false,
  isDead: false,
  deathTimer: 0,
  tilt: 0,
};

// ─── OBSTACLES ─────────────────────────────────────────────────────────────────
let obstacles   = [];
let hotdogItems = [];
let particles   = [];
let clouds      = [];
let bgTrees     = [];

// Obstacle types: chair, ball, noodle, flamingo, doubleNoodle
const OBSTACLE_TYPES = ['chair','ball','noodle','flamingo','doubleNoodle'];

function spawnObstacle() {
  const t     = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
  let w, h, gy;
  switch(t) {
    case 'chair':       w=42; h=52; gy=GROUND_Y; break;
    case 'ball':        w=38; h=38; gy=GROUND_Y; break;
    case 'noodle':      w=16; h=70; gy=GROUND_Y; break;
    case 'flamingo':    w=34; h=64; gy=GROUND_Y; break;
    case 'doubleNoodle':w=16; h=48; gy=GROUND_Y; break;
  }
  obstacles.push({ type:t, x:BASE_W+20, w, h, gy, hit:false });
}

function spawnHotdog() {
  const heights = [GROUND_Y - 10, GROUND_Y - 40, GROUND_Y - 80, GROUND_Y - 120];
  const yy = heights[Math.floor(Math.random() * heights.length)];
  hotdogItems.push({ x:BASE_W+20, y:yy, collected:false, bobOffset: Math.random()*Math.PI*2, floatT:0 });
}

function spawnCloud() {
  clouds.push({
    x: BASE_W + 60,
    y: 30 + Math.random() * 100,
    r: 25 + Math.random() * 40,
    speed: 0.5 + Math.random() * 0.8,
  });
}

function spawnBgTree() {
  bgTrees.push({ x: BASE_W + 20, y: GROUND_Y - 2, size: 24 + Math.random()*20, speed: speed * 0.4 });
}

// ─── INITIAL SCENERY ───────────────────────────────────────────────────────────
for(let i=0;i<4;i++) clouds.push({x:80+i*220,y:30+Math.random()*90,r:28+Math.random()*35,speed:0.6+Math.random()*0.5});
for(let i=0;i<5;i++) bgTrees.push({x:60+i*160,y:GROUND_Y-2,size:24+Math.random()*18,speed:INIT_SPEED*0.4});

// ─── SPAWN SCHEDULING ──────────────────────────────────────────────────────────
let obstacleTimer = 0;
let obstacleGap   = 1800;   // ms between obstacles (decreases with speed)
let hotdogTimer   = 0;
let hotdogGap     = 2200;
let cloudTimer    = 0;
let treeTimer     = 0;

// ─── INPUT ─────────────────────────────────────────────────────────────────────
function onDown(e) {
  e.preventDefault();
  if (state === 'start') { startGame(); return; }
  if (state === 'dead')  { startGame(); return; }
  if (state === 'playing') {
    holdStart  = performance.now();
    isHolding  = true;
  }
}

function onUp(e) {
  e.preventDefault();
  if (state !== 'playing' || !isHolding) return;
  const held = performance.now() - holdStart;
  isHolding  = false;
  doJump(held);
}

canvas.addEventListener('mousedown',  onDown, {passive:false});
canvas.addEventListener('mouseup',    onUp,   {passive:false});
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchend',   onUp,   {passive:false});
document.addEventListener('keydown', e => { if(e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); onDown(e); } });
document.addEventListener('keyup',   e => { if(e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); onUp(e);   } });

function doJump(heldMs) {
  if (!player.onGround) return;
  const t  = Math.min(heldMs, HOLD_MAX) / HOLD_MAX;
  const vy = JUMP_MIN + (JUMP_MAX - JUMP_MIN) * t;
  player.vy        = vy;
  player.onGround  = false;
  player.squish    = 0.65 + 0.35*(1-t);  // more squish on big jump charge
  player.jumpDust  = true;
  spawnJumpParticles();
}

// ─── GAME CONTROL ──────────────────────────────────────────────────────────────
function startGame() {
  state       = 'playing';
  score       = 0;
  hotdogs     = 0;
  distance    = 0;
  speed       = INIT_SPEED;
  elapsed     = 0;
  obstacles   = [];
  hotdogItems = [];
  particles   = [];
  comboCount  = 0;
  comboTimer  = 0;
  isHolding   = false;

  player.y        = GROUND_Y;
  player.vy       = 0;
  player.onGround = true;
  player.isDead   = false;
  player.deathTimer = 0;
  player.tilt     = 0;
  player.squish   = 1;
  player.frame    = 0;

  obstacleTimer = 800;
  hotdogTimer   = 1500;
  cloudTimer    = 3000;
  treeTimer     = 1200;
}

function killPlayer() {
  if (player.isDead) return;
  player.isDead   = true;
  player.deathTimer = 0;
  screenShake     = 12;
  state           = 'dead';
  if (hotdogs > highHotdogs) highHotdogs = hotdogs;
  if (score   > highScore)   highScore   = score;
  spawnDeathParticles();
}

// ─── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnJumpParticles() {
  for(let i=0;i<6;i++) {
    particles.push({
      x: player.x + player.w/2 + (Math.random()-0.5)*20,
      y: GROUND_Y + player.h,
      vx: (Math.random()-0.5)*3,
      vy: -Math.random()*3,
      life:1, decay: 0.05+Math.random()*0.04,
      r: 3+Math.random()*4,
      color:'rgba(255,255,255,0.8)'
    });
  }
}

function spawnCollectParticles(x,y) {
  for(let i=0;i<14;i++) {
    const angle = (i/14)*Math.PI*2;
    particles.push({
      x, y,
      vx: Math.cos(angle)*( 2+Math.random()*4 ),
      vy: Math.sin(angle)*( 2+Math.random()*4 ),
      life:1, decay:0.04+Math.random()*0.03,
      r: 3+Math.random()*4,
      color: i%2===0 ? '#FFD600' : '#FF6B35'
    });
  }
}

function spawnDeathParticles() {
  for(let i=0;i<20;i++) {
    particles.push({
      x: player.x+player.w/2 + (Math.random()-0.5)*player.w,
      y: player.y+player.h/2 + (Math.random()-0.5)*player.h,
      vx: (Math.random()-0.5)*8,
      vy: -Math.random()*8,
      life:1, decay:0.025+Math.random()*0.02,
      r: 4+Math.random()*6,
      color: i%3===0?'#FF6B35':i%3===1?'#FFD600':'#FFFFFF'
    });
  }
}

// ─── COLLISION HELPERS ─────────────────────────────────────────────────────────
function playerRect() {
  return {
    x: player.x + 5,
    y: player.y,
    w: player.w - 10,
    h: player.h,
  };
}

function obstacleRect(o) {
  return { x: o.x, y: o.gy - o.h, w: o.w, h: o.h };
}

function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x &&
         a.y < b.y+b.h && a.y+a.h > b.y;
}

// ─── UPDATE ────────────────────────────────────────────────────────────────────
function update(dt) {
  if (state !== 'playing') return;

  elapsed     += dt;
  distance    += speed * dt / 60;
  score        = Math.floor(distance / 10);

  // Accelerate over time
  speed = Math.min(MAX_SPEED, INIT_SPEED + elapsed * ACCEL);

  // Spawn scheduling
  obstacleTimer -= dt;
  hotdogTimer   -= dt;
  cloudTimer    -= dt;
  treeTimer     -= dt;
  comboTimer    -= dt;
  if (comboTimer <= 0) comboCount = 0;

  const spawnGap = Math.max(900, 1800 - (elapsed * 0.15));
  if (obstacleTimer <= 0) {
    spawnObstacle();
    obstacleTimer = spawnGap + (Math.random()-0.5)*300;
  }
  const hdGap = Math.max(1200, 2200 - (elapsed*0.1));
  if (hotdogTimer <= 0) {
    spawnHotdog();
    hotdogTimer = hdGap + (Math.random()-0.5)*400;
  }
  if (cloudTimer <= 0) { spawnCloud(); cloudTimer = 3000+Math.random()*2000; }
  if (treeTimer  <= 0) { spawnBgTree(); treeTimer = 1000+Math.random()*800; }

  // Player physics
  if (!player.onGround) {
    player.vy     += GRAVITY;
    player.y      += player.vy;
    player.squish += (1 - player.squish) * 0.2;
    if (player.y >= GROUND_Y) {
      player.y        = GROUND_Y;
      player.vy       = 0;
      player.onGround = true;
      player.squish   = 1.3;        // squash on landing
      spawnJumpParticles();
    }
  } else {
    player.squish += (1 - player.squish) * 0.15;
  }

  // Leg animation
  player.frameTimer += dt;
  if (player.frameTimer > 80) {
    player.frame     = (player.frame + 1) % 4;
    player.frameTimer = 0;
  }
  player.legAngle = Math.sin(player.frame / 4 * Math.PI * 2) * 30;

  // Screen shake decay
  if (screenShake > 0) screenShake *= 0.8;

  // Obstacles
  for(let i=obstacles.length-1; i>=0; i--) {
    const o = obstacles[i];
    o.x -= speed;
    if (o.x + o.w < -20) { obstacles.splice(i,1); continue; }
    if (!o.hit && rectsOverlap(playerRect(), obstacleRect(o))) {
      killPlayer();
    }
  }

  // Hotdogs
  for(let i=hotdogItems.length-1; i>=0; i--) {
    const h = hotdogItems[i];
    h.x    -= speed;
    h.floatT += dt;
    if (h.x + 30 < -20) { hotdogItems.splice(i,1); continue; }
    if (!h.collected) {
      const hr = { x:h.x-14, y:h.y-10, w:28, h:20 };
      if (rectsOverlap(playerRect(), hr)) {
        h.collected = true;
        hotdogs++;
        score += 50;
        comboCount++;
        comboTimer = 2000;
        spawnCollectParticles(h.x, h.y);
        hotdogItems.splice(i,1);
      }
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i,1);
  }

  // Clouds
  for(let i=clouds.length-1;i>=0;i--) {
    clouds[i].x -= clouds[i].speed;
    if (clouds[i].x < -100) clouds.splice(i,1);
  }

  // BG trees
  for(let i=bgTrees.length-1;i>=0;i--) {
    bgTrees[i].x -= speed * 0.35;
    if (bgTrees[i].x < -60) bgTrees.splice(i,1);
  }

  bgOffset    = (bgOffset + speed * 0.15) % BASE_W;
  cloudOffset = (cloudOffset + 0.4) % BASE_W;
}

// ─── DRAW HELPERS ──────────────────────────────────────────────────────────────
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ─── DRAW BACKGROUND ───────────────────────────────────────────────────────────
function drawBackground() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0,0,0,GROUND_Y);
  skyGrad.addColorStop(0,'#5ba3d0');
  skyGrad.addColorStop(1,'#a8ddf0');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,BASE_W,GROUND_Y);

  // Sun
  ctx.save();
  ctx.shadowBlur   = 30;
  ctx.shadowColor  = '#FFD600';
  ctx.fillStyle    = '#FFE44D';
  ctx.beginPath();
  ctx.arc(BASE_W-80, 60, 36, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Sun rays
  ctx.save();
  ctx.strokeStyle = 'rgba(255,220,0,0.35)';
  ctx.lineWidth   = 3;
  for(let i=0;i<8;i++) {
    const a = (i/8)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(BASE_W-80 + Math.cos(a)*40, 60+Math.sin(a)*40);
    ctx.lineTo(BASE_W-80 + Math.cos(a)*54, 60+Math.sin(a)*54);
    ctx.stroke();
  }
  ctx.restore();

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for(const cl of clouds) {
    drawCloud(cl.x, cl.y, cl.r);
  }

  // Background palm trees
  for(const t of bgTrees) {
    drawPalmTree(t.x, t.y, t.size, 0.55);
  }

  // Pool water area
  const waterGrad = ctx.createLinearGradient(0,GROUND_Y,0,BASE_H);
  waterGrad.addColorStop(0,'#29b6f6');
  waterGrad.addColorStop(1,'#0277bd');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, GROUND_Y, BASE_W, BASE_H - GROUND_Y);

  // Pool tiles pattern
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  const tileSize = 24;
  const offX = bgOffset % tileSize;
  for(let x = -offX; x < BASE_W; x += tileSize) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y);
    ctx.lineTo(x, BASE_H);
    ctx.stroke();
  }
  for(let y = GROUND_Y; y < BASE_H; y += tileSize) {
    ctx.beginPath();
    ctx.moveTo(0,y); ctx.lineTo(BASE_W,y);
    ctx.stroke();
  }
  ctx.restore();

  // Pool deck (ground strip)
  ctx.fillStyle = '#e8f5e9';
  ctx.fillRect(0, GROUND_Y-4, BASE_W, 8);

  // Deck pattern – dotted lane markings
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth   = 3;
  ctx.setLineDash([20,18]);
  ctx.lineDashOffset = -bgOffset;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(BASE_W, GROUND_Y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Water shimmer
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#ffffff';
  const shimmerX = (bgOffset * 2) % BASE_W;
  for(let i=0;i<6;i++) {
    const sx = (shimmerX + i * 140) % BASE_W;
    ctx.beginPath();
    ctx.ellipse(sx, GROUND_Y+30+i*12, 40+i*5, 4, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawCloud(x,y,r) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.beginPath(); ctx.arc(x,      y,    r,      0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r*0.8, y-r*0.3, r*0.75, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x-r*0.7, y-r*0.1, r*0.65, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r*1.5, y+r*0.1, r*0.55, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPalmTree(x,y,size,alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // trunk
  ctx.strokeStyle = '#795548';
  ctx.lineWidth = size/6;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x-size*0.2, y-size*0.7, x+size*0.1, y-size*1.2, x, y-size*1.6);
  ctx.stroke();
  // leaves
  ctx.fillStyle = '#388e3c';
  const leafAngles = [-70,-40,-10,20,50,80];
  for(const a of leafAngles) {
    ctx.save();
    ctx.translate(x, y-size*1.6);
    ctx.rotate(a * Math.PI/180);
    ctx.beginPath();
    ctx.ellipse(size*0.55, 0, size*0.6, size*0.12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

// ─── DRAW OBSTACLES ────────────────────────────────────────────────────────────
function drawObstacle(o) {
  const x = o.x, bot = o.gy;
  ctx.save();
  switch(o.type) {
    case 'chair':      drawChair(x, bot, o.w, o.h);     break;
    case 'ball':       drawBeachBall(x, bot, o.w);       break;
    case 'noodle':     drawNoodle(x, bot, o.w, o.h, '#FF7043'); break;
    case 'flamingo':   drawFlamingo(x, bot, o.w, o.h);  break;
    case 'doubleNoodle':
      drawNoodle(x,          bot, o.w, o.h, '#FF7043');
      drawNoodle(x+o.w+14,   bot, o.w, o.h*0.75, '#AB47BC');
      break;
  }
  ctx.restore();
}

function drawChair(x, bot, w, h) {
  // legs
  ctx.fillStyle = '#F9A825';
  ctx.fillRect(x+3,  bot-h+10, 6, h-10);
  ctx.fillRect(x+w-9,bot-h+10, 6, h-10);
  // seat
  ctx.fillStyle = '#FFCC02';
  roundRect(x, bot-h+6, w, h*0.25, 4);
  ctx.fill();
  // back
  ctx.fillStyle = '#FFCC02';
  roundRect(x, bot-h, w, h*0.35, 4);
  ctx.fill();
  // stripes
  ctx.strokeStyle = '#E65100';
  ctx.lineWidth   = 2.5;
  for(let i=0;i<3;i++) {
    ctx.beginPath();
    ctx.moveTo(x+6+i*((w-12)/2), bot-h);
    ctx.lineTo(x+6+i*((w-12)/2), bot-h+h*0.35);
    ctx.stroke();
  }
}

function drawBeachBall(x, bot, w) {
  const cx = x+w/2, cy = bot-w/2, r = w/2;
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  // segments
  const colors = ['#E91E63','#FFEB3B','#2196F3','#4CAF50'];
  for(let i=0;i<4;i++) {
    const a1 = (i/4)*Math.PI*2, a2=((i+1)/4)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,a1,a2);
    ctx.closePath();
    ctx.fillStyle = colors[i]; ctx.fill();
  }
  // shine
  ctx.beginPath();
  ctx.arc(cx-r*0.25, cy-r*0.25, r*0.28, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
  ctx.restore();
}

function drawNoodle(x, bot, w, h, color) {
  ctx.save();
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(x+w/2, bot+3, w, 5, 0, 0, Math.PI*2);
  ctx.fill();
  // noodle body
  roundRect(x, bot-h, w, h, w/2);
  const grad = ctx.createLinearGradient(x,0,x+w,0);
  grad.addColorStop(0,'#fff4');
  grad.addColorStop(0.4, color);
  grad.addColorStop(1, shadeColor(color,-30));
  ctx.fillStyle = grad; ctx.fill();
  // stripe
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.moveTo(x+w*0.3, bot-h+4);
  ctx.lineTo(x+w*0.3, bot-4);
  ctx.stroke();
  ctx.restore();
}

function drawFlamingo(x, bot, w, h) {
  ctx.save();
  const cx = x + w/2;
  // body
  ctx.fillStyle = '#EC407A';
  ctx.beginPath();
  ctx.ellipse(cx, bot-h*0.5, w*0.45, h*0.3, -0.2, 0, Math.PI*2);
  ctx.fill();
  // neck
  ctx.strokeStyle = '#EC407A';
  ctx.lineWidth   = 7;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(cx+w*0.15, bot-h*0.65);
  ctx.bezierCurveTo(cx+w*0.4, bot-h*0.85, cx+w*0.3, bot-h*0.95, cx+w*0.1, bot-h+4);
  ctx.stroke();
  // head
  ctx.fillStyle = '#EC407A';
  ctx.beginPath(); ctx.arc(cx+w*0.1, bot-h+4, 7, 0, Math.PI*2); ctx.fill();
  // beak
  ctx.fillStyle = '#FFB300';
  ctx.beginPath();
  ctx.moveTo(cx+w*0.1+5, bot-h+4);
  ctx.lineTo(cx+w*0.1+14, bot-h+8);
  ctx.lineTo(cx+w*0.1+5, bot-h+9);
  ctx.closePath(); ctx.fill();
  // eye
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(cx+w*0.1+3, bot-h+2, 2, 0, Math.PI*2); ctx.fill();
  // legs
  ctx.strokeStyle = '#EC407A';
  ctx.lineWidth   = 4;
  ctx.lineCap     = 'round';
  ctx.beginPath(); ctx.moveTo(cx-5, bot-h*0.28); ctx.lineTo(cx-6, bot); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+5, bot-h*0.28); ctx.lineTo(cx+7, bot); ctx.stroke();
  // feet
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx-9,bot); ctx.lineTo(cx-2,bot); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+4,bot); ctx.lineTo(cx+11,bot); ctx.stroke();
  ctx.restore();
}

function shadeColor(hex, pct) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0,Math.min(255,r+pct)); g = Math.max(0,Math.min(255,g+pct)); b = Math.max(0,Math.min(255,b+pct));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ─── DRAW HOTDOG ───────────────────────────────────────────────────────────────
function drawHotdog(h) {
  const x = h.x;
  const bob = Math.sin(h.floatT * 0.003 + h.bobOffset) * 5;
  const y   = h.y + bob;
  ctx.save();

  // glow
  ctx.shadowBlur  = 14;
  ctx.shadowColor = '#FFD600';

  // bun top
  ctx.fillStyle = '#f0a500';
  ctx.beginPath();
  ctx.ellipse(x, y-6, 16, 8, 0, Math.PI, 0);
  ctx.fill();
  // bun bottom
  ctx.fillStyle = '#c8820a';
  ctx.beginPath();
  ctx.ellipse(x, y+4, 16, 6, 0, 0, Math.PI);
  ctx.fill();
  // sausage
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.ellipse(x, y-1, 14, 5, 0, 0, Math.PI*2);
  ctx.fill();
  // mustard squiggle
  ctx.strokeStyle = '#f1c40f';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(x-9, y-3);
  ctx.bezierCurveTo(x-5,y-7, x,y+1, x+5,y-6);
  ctx.bezierCurveTo(x+7,y-8, x+10,y-4, x+10,y-2);
  ctx.stroke();

  ctx.restore();
}

// ─── DRAW GØRG ─────────────────────────────────────────────────────────────────
function drawGorg() {
  ctx.save();

  const cx   = player.x + player.w / 2;
  const baseY= player.y;
  const sy   = player.squish;
  const onG  = player.onGround;

  // squish/stretch transform
  ctx.translate(cx, baseY + player.h);
  ctx.scale(1, sy);
  ctx.translate(-cx, -(baseY + player.h));

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(cx, GROUND_Y + player.h + 3, (player.w/2)*0.9, 5, 0, 0, Math.PI*2);
  ctx.fill();

  const legLen = 16;
  const legOff = player.legAngle * (Math.PI/180);

  // ── LEGS ──
  ctx.lineCap    = 'round';
  ctx.lineWidth  = 8;
  ctx.strokeStyle= '#0077b6';

  // left leg
  const la = onG ? legOff : (player.vy < 0 ? -0.5 : 0.5);
  ctx.beginPath();
  ctx.moveTo(cx-5, baseY+player.h-14);
  ctx.lineTo(cx-5 + Math.sin(la)*legLen, baseY+player.h - 14 + Math.abs(Math.cos(la))*legLen);
  ctx.stroke();
  // right leg
  const ra = onG ? -legOff : (player.vy < 0 ? 0.5 : -0.5);
  ctx.beginPath();
  ctx.moveTo(cx+5, baseY+player.h-14);
  ctx.lineTo(cx+5 + Math.sin(ra)*legLen, baseY+player.h - 14 + Math.abs(Math.cos(ra))*legLen);
  ctx.stroke();

  // ── SHORTS ──
  ctx.fillStyle = '#0077b6';
  roundRect(cx-14, baseY+player.h-22, 28, 14, 5);
  ctx.fill();

  // ── BODY / SHIRT ──
  const bodyGrad = ctx.createLinearGradient(cx-16, baseY+10, cx+16, baseY+10);
  bodyGrad.addColorStop(0,'#FF8C42');
  bodyGrad.addColorStop(1,'#FF6B35');
  ctx.fillStyle = bodyGrad;
  roundRect(cx-14, baseY + 12, 28, player.h - 30, 8);
  ctx.fill();

  // shirt print: tiny hotdog icon
  ctx.font      = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🌭', cx, baseY + 30);

  // ── ARMS ──
  ctx.lineWidth   = 7;
  ctx.strokeStyle = '#FDBCB4';
  ctx.lineCap     = 'round';
  const armSwing = onG ? Math.sin(player.frame/4*Math.PI*2 + Math.PI) * 20 : (player.vy < 0 ? -40 : 20);
  // left arm
  ctx.beginPath();
  ctx.moveTo(cx-14, baseY+18);
  ctx.lineTo(cx-14-Math.cos(armSwing*Math.PI/180)*14, baseY+18+Math.sin(armSwing*Math.PI/180)*14);
  ctx.stroke();
  // right arm
  ctx.beginPath();
  ctx.moveTo(cx+14, baseY+18);
  ctx.lineTo(cx+14+Math.cos(armSwing*Math.PI/180)*14, baseY+18+Math.sin(armSwing*Math.PI/180)*14);
  ctx.stroke();

  // ── HEAD ──
  ctx.fillStyle = '#FDBCB4';
  ctx.beginPath();
  ctx.arc(cx, baseY+8, 18, 0, Math.PI*2);
  ctx.fill();

  // ── HAIR ──
  ctx.fillStyle = '#5D2E0C';
  ctx.beginPath();
  ctx.arc(cx, baseY+1, 18, Math.PI, 0);
  ctx.fill();
  // hair tufts
  ctx.fillStyle = '#5D2E0C';
  for(let i=0;i<4;i++) {
    const hx = cx - 12 + i*8;
    ctx.beginPath();
    ctx.arc(hx, baseY - 12, 6, 0, Math.PI*2);
    ctx.fill();
  }

  // ── EYES ──
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx-6, baseY+7, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+6, baseY+7, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  // eye direction: look forward, slightly determined
  ctx.beginPath(); ctx.arc(cx-5, baseY+7, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+7, baseY+7, 2.5, 0, Math.PI*2); ctx.fill();
  // pupils
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx-4.5, baseY+6.5, 0.9, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+7.5, baseY+6.5, 0.9, 0, Math.PI*2); ctx.fill();

  // ── SUNGLASSES ──
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth   = 2;
  ctx.fillStyle   = 'rgba(0,100,200,0.55)';
  roundRect(cx-12, baseY+4, 10, 7, 3); ctx.fill(); ctx.stroke();
  roundRect(cx+2,  baseY+4, 10, 7, 3); ctx.fill(); ctx.stroke();
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx-2, baseY+7); ctx.lineTo(cx+2, baseY+7); ctx.stroke();
  // temples
  ctx.beginPath(); ctx.moveTo(cx-12, baseY+7); ctx.lineTo(cx-18, baseY+6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+12, baseY+7); ctx.lineTo(cx+18, baseY+6); ctx.stroke();

  // ── MOUTH ──
  ctx.strokeStyle = '#c0786a';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.arc(cx, baseY+14, 5, 0.1*Math.PI, 0.9*Math.PI);
  ctx.stroke();

  ctx.restore();
}

// ─── DRAW HUD ──────────────────────────────────────────────────────────────────
function drawHUD() {
  // Speed bar
  const spFrac = (speed - INIT_SPEED) / (MAX_SPEED - INIT_SPEED);
  const barW   = 120, barH = 12, barX = BASE_W - barW - 16, barY = 16;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  roundRect(barX-2, barY-2, barW+4, barH+4, 5); ctx.fill();
  const speedGrad = ctx.createLinearGradient(barX,0,barX+barW,0);
  speedGrad.addColorStop(0,'#00e676');
  speedGrad.addColorStop(0.6,'#FFEB3B');
  speedGrad.addColorStop(1,'#ff1744');
  ctx.fillStyle = speedGrad;
  roundRect(barX, barY, barW * spFrac, barH, 4); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = 'bold 9px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('SPEED', barX, barY - 3);

  // Score pill
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(12, 12, 130, 36, 10); ctx.fill();
  ctx.fillStyle = '#FFD600';
  ctx.font      = 'bold 14px Arial Black, Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 22, 35);

  // Hotdog counter
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(12, 56, 110, 32, 10); ctx.fill();
  ctx.font      = 'bold 13px Arial';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`🌭 × ${hotdogs}`, 22, 77);

  // Combo
  if (comboCount >= 2 && comboTimer > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, comboTimer / 500);
    ctx.font        = 'bold 28px Arial Black, Arial';
    ctx.textAlign   = 'center';
    ctx.fillStyle   = '#FFD600';
    ctx.shadowBlur  = 16;
    ctx.shadowColor = '#FF6B35';
    ctx.fillText(`×${comboCount} COMBO!`, BASE_W/2, 80);
    ctx.restore();
  }

  // Hold indicator (when holding down)
  if (isHolding && state === 'playing') {
    const heldFrac = Math.min(1, (performance.now() - holdStart) / HOLD_MAX);
    const indW = 50, indH = 8;
    const ix = player.x + player.w/2 - indW/2;
    const iy = player.y - 28;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(ix, iy, indW, indH, 4); ctx.fill();
    const iGrad = ctx.createLinearGradient(ix,0,ix+indW,0);
    iGrad.addColorStop(0,'#00e5ff');
    iGrad.addColorStop(1,'#ff1744');
    ctx.fillStyle = iGrad;
    roundRect(ix, iy, indW*heldFrac, indH, 4); ctx.fill();
  }
}

// ─── DRAW PARTICLES ────────────────────────────────────────────────────────────
function drawParticles() {
  for(const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── DRAW START SCREEN ─────────────────────────────────────────────────────────
function drawStartScreen() {
  // dim overlay
  ctx.fillStyle = 'rgba(0,30,60,0.72)';
  ctx.fillRect(0,0,BASE_W,BASE_H);

  // title panel
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(BASE_W/2-200, BASE_H/2-160, 400, 280, 20);
  ctx.fill();
  ctx.restore();

  // title
  ctx.save();
  ctx.textAlign   = 'center';
  ctx.font        = 'bold 46px Arial Black, Arial';
  ctx.shadowBlur  = 20;
  ctx.shadowColor = '#FFD600';
  ctx.fillStyle   = '#FFD600';
  ctx.fillText("GØRG'S", BASE_W/2, BASE_H/2 - 100);
  ctx.font        = 'bold 38px Arial Black, Arial';
  ctx.fillStyle   = '#FF6B35';
  ctx.shadowColor = '#FF6B35';
  ctx.fillText('HOTDOG RUN', BASE_W/2, BASE_H/2 - 58);
  ctx.restore();

  // instructions
  ctx.textAlign   = 'center';
  ctx.fillStyle   = '#ffffff';
  ctx.font        = '16px Arial';
  ctx.fillText('🌭  Collect hotdogs for the pool party!', BASE_W/2, BASE_H/2 - 10);
  ctx.fillText('Tap  →  jump over obstacles', BASE_W/2, BASE_H/2 + 20);
  ctx.fillText('Hold  →  bigger jump', BASE_W/2, BASE_H/2 + 46);

  // start button
  ctx.save();
  ctx.fillStyle   = '#FF6B35';
  ctx.shadowBlur  = 16;
  ctx.shadowColor = '#FF6B35';
  roundRect(BASE_W/2-90, BASE_H/2+72, 180, 46, 23);
  ctx.fill();
  ctx.fillStyle   = '#ffffff';
  ctx.font        = 'bold 20px Arial Black, Arial';
  ctx.textAlign   = 'center';
  ctx.fillText('LETS GO! 🔥', BASE_W/2, BASE_H/2 + 101);
  ctx.restore();
}

// ─── DRAW DEATH SCREEN ─────────────────────────────────────────────────────────
function drawDeathScreen() {
  ctx.fillStyle = 'rgba(0,20,40,0.68)';
  ctx.fillRect(0,0,BASE_W,BASE_H);

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  roundRect(BASE_W/2-195, BASE_H/2-160, 390, 300, 20);
  ctx.fill();
  ctx.restore();

  ctx.textAlign   = 'center';
  ctx.font        = 'bold 42px Arial Black, Arial';
  ctx.fillStyle   = '#ff1744';
  ctx.shadowBlur  = 20;
  ctx.shadowColor = '#ff1744';
  ctx.fillText('WIPED OUT!', BASE_W/2, BASE_H/2 - 100);
  ctx.shadowBlur  = 0;

  ctx.font        = '18px Arial';
  ctx.fillStyle   = '#FFD600';
  ctx.fillText(`🌭 Hotdogs collected: ${hotdogs}`, BASE_W/2, BASE_H/2 - 55);
  ctx.fillStyle   = '#fff';
  ctx.fillText(`Score: ${score}`, BASE_W/2, BASE_H/2 - 24);

  ctx.fillStyle   = 'rgba(255,255,255,0.35)';
  ctx.font        = '14px Arial';
  ctx.fillText(`Best: ${highHotdogs} hotdogs · ${highScore} pts`, BASE_W/2, BASE_H/2 + 10);

  const msg = hotdogs === 0 ? "No hotdogs?! Gørg is devastated. 😭"
            : hotdogs < 5  ? "A few hotdogs saved! The party lives. 🎉"
            : hotdogs < 10 ? "Solid haul! The grill is fired up! 🔥"
                           : "LEGENDARY! Gørg feeds the whole block! 🏆";
  ctx.fillStyle = '#ffffff';
  ctx.font      = '15px Arial';
  ctx.fillText(msg, BASE_W/2, BASE_H/2 + 38);

  // retry button
  ctx.save();
  ctx.fillStyle   = '#00e676';
  ctx.shadowBlur  = 14;
  ctx.shadowColor = '#00e676';
  roundRect(BASE_W/2-90, BASE_H/2+68, 180, 46, 23);
  ctx.fill();
  ctx.fillStyle   = '#003300';
  ctx.font        = 'bold 20px Arial Black, Arial';
  ctx.textAlign   = 'center';
  ctx.fillText('RUN AGAIN! 🌭', BASE_W/2, BASE_H/2 + 97);
  ctx.restore();
}

// ─── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  ctx.save();

  // Screen shake
  if (screenShake > 0.5) {
    ctx.translate(
      (Math.random()-0.5)*screenShake,
      (Math.random()-0.5)*screenShake
    );
  }

  drawBackground();

  // Draw hotdogs
  for(const h of hotdogItems) drawHotdog(h);

  // Draw obstacles
  for(const o of obstacles) drawObstacle(o);

  // Draw Gørg
  if (!player.isDead) drawGorg();

  // Particles
  drawParticles();

  // HUD (on top, no shake)
  ctx.restore();
  if (state === 'playing') drawHUD();

  // Overlays
  if (state === 'start') { drawBackground(); drawGorg(); drawStartScreen(); }
  if (state === 'dead')  drawDeathScreen();
}

// ─── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = lastTime ? Math.min(ts - lastTime, 50) : 16;
  lastTime = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
